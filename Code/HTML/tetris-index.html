<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tetris Home</title>
  <!-- Link to CSS file -->
  <link rel="stylesheet" href="../CSS/tetris.css">
</head>
<body>
  <!-- Game title with different coloured letters -->
  <h1 class="tetris-title">
    <span>T</span><span>E</span><span>T</span><span>R</span><span>I</span><span>S</span>
  </h1>

  <div class="home-container">

    <div class="menu-buttons">
      <!-- Link to diffrent pages that have different coloured buttons-->
      <button class="menu-btn red" onclick="window.location.href='tetris-register.html'">Register</button>
      <button class="menu-btn orange" onclick="window.location.href='tetris-login.html'">Login</button>
      <button class="menu-btn green" onclick="window.location.href='tetris-option.html'">Options</button>
      <button class="menu-btn blue" onclick="window.location.href='tetris-ranking.html'">Ranking</button>

  </div>
